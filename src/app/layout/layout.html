<div class="header">
  <app-header></app-header>

  <!-- כפתור המבורגר במובייל -->
  <button
    type="button"
    class="hamburger"
    aria-label="פתח תפריט"
    (click)="menuCollapsed = false">
    ☰
  </button>
</div>

<!-- פס “חם” בימין לדסקטופ – פותח תפריט צף בהובר -->
<div class="edge-hotzone"
     (mouseenter)="openFromHover()"
     (mouseleave)="closeFromHover()">
</div>

<div class="body-layout"
     [class.menu-collapsed]="menuCollapsed"
     [class.drawer-open]="!menuCollapsed"
     (touchstart)="onTouchStart($event)"
     (touchmove)="onTouchMove($event)"
     (touchend)="onTouchEnd()">

  <aside class="slider"
         aria-label="Side menu"
         (mouseenter)="hoveringMenu = true"
         (mouseleave)="hoveringMenu = false">
    <app-slider [collapsed]="menuCollapsed" (collapsedChange)="onCollapsedChange($event)"></app-slider>
  </aside>

  <div class="scrim" *ngIf="!menuCollapsed" (click)="menuCollapsed = true"></div>

  <main class="main-content">
    <div class="content-area">
      <router-outlet></router-outlet>
    </div>
  </main>
  <!-- כפתור נגישות -->
  <button
  type="button"
  class="accessibility-fab"
  (click)="openAccessibilityModal()"
  aria-label="פתיחת הצהרת נגישות"
  title="נגישות">
  ♿
</button>
</div>
 <footer class="site-footer">
  <a href="" (click)="$event.preventDefault(); openAccessibilityModal()">הצהרת נגישות</a>
  <a href="" (click)="$event.preventDefault(); openPrivacyModal()">מדיניות פרטיות</a>
</footer>

<!-- Modal: Accessibility -->
<div
  class="legal-modal-backdrop"
  *ngIf="isAccessibilityOpen"
  (click)="closeAccessibilityModal()">

  <div
    class="legal-modal"
    role="dialog"
    aria-modal="true"
    aria-labelledby="accessibilityModalTitle"
    (click)="$event.stopPropagation()">

    <button
      type="button"
      class="legal-modal-close"
      aria-label="סגירת חלון נגישות"
      (click)="closeAccessibilityModal()">
      ✕
    </button>

    <app-accessibility></app-accessibility>
  </div>
</div>

<!-- Modal: Privacy Policy -->
<div
  class="legal-modal-backdrop"
  *ngIf="isPrivacyOpen"
  (click)="closePrivacyModal()">

  <div
    class="legal-modal"
    role="dialog"
    aria-modal="true"
    aria-labelledby="privacyModalTitle"
    (click)="$event.stopPropagation()">

    <button
      type="button"
      class="legal-modal-close"
      aria-label="סגירת חלון פרטיות"
      (click)="closePrivacyModal()">
      ✕
    </button>

    <app-privacy-policy></app-privacy-policy>
  </div>
</div>
