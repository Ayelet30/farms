<div class="page" dir="rtl">
    <div class="page-header">
        <h2>הוספת שירות לרוכב עצמאי</h2>
        <p>כאן המזכירה יכולה להוסיף שירות ישירות לרוכב ולסוס שלו.</p>
    </div>

    <div *ngIf="loading" class="state-card">
        טוען נתונים...
    </div>

    <div *ngIf="!loading && error" class="state-card error">
        {{ error }}
    </div>

    <div *ngIf="!loading && success" class="state-card success">
        {{ success }}
    </div>
    <div class="saving-overlay" *ngIf="saving">
        <div class="saving-box">
            <div class="spinner"></div>
            <div>שומרת נתונים...</div>
        </div>
    </div>
    <form *ngIf="!loading" class="service-form" (ngSubmit)="submit()">
        <div class="form-grid">
            <div class="field">
                <label>רוכב עצמאי</label>
                <select [(ngModel)]="selectedRiderUid" name="rider_uid" (change)="onRiderChanged()">
                    <option value="">בחרי רוכב</option>
                    <option *ngFor="let rider of riders" [value]="rider.uid">
                        {{ rider.first_name }} {{ rider.last_name }}
                    </option>
                </select>
            </div>

            <div class="field">
                <label>סוס</label>
                <select [(ngModel)]="form.horse_uid" name="horse_uid" (change)="onHorseChanged()">
                    <option value="">בחרי סוס</option>
                    <option *ngFor="let horse of horses" [value]="horse.id">
                        {{ horse.name }}
                    </option>
                </select>
            </div>

            <div class="field">
                <label>סוג שירות</label>
                <select [(ngModel)]="form.service_type_id" name="service_type_id" (change)="onServiceChanged()">
                    <option value="">בחרי שירות</option>
                    <option *ngFor="let service of serviceTypes" [value]="service.id">
                        {{ service.name }}
                    </option>
                </select>

            </div>
            <div *ngIf="permanentServiceWarning" class="warning-box">
                ⚠️ {{ permanentServiceWarning }}
            </div>

            <div class="field">
                <label>מחיר</label>
                <input type="number" min="0" [ngModel]="priceShekel()" name="price_shekel"
                    (ngModelChange)="priceShekelChanged($event)" />
            </div>

            <div class="field">
                <label>אופי שירות</label>
                <select [(ngModel)]="form.service_mode" name="service_mode">
                    <option *ngFor="let mode of serviceModeOptions" [value]="mode.value">
                        {{ mode.label }}
                    </option>
                </select>
            </div>

            <div class="field">
                <label>תאריך התחלה</label>
                <input type="date" [(ngModel)]="form.start_date" name="start_date" />
            </div>

            <div class="field" *ngIf="isRecurringRangeMode">
                <label>תאריך סיום</label>
                <input type="date" [(ngModel)]="form.end_date" name="end_date" />
            </div>

            <ng-container *ngIf="!isOnceMode">
                <div class="field">
                    <label>יחידת חזרתיות</label>
                    <select [(ngModel)]="form.recurrence_unit" name="recurrence_unit">
                        <option *ngFor="let unit of recurrenceUnitOptions" [value]="unit.value">
                            {{ unit.label }}
                        </option>
                    </select>
                </div>

                <div class="field">
                    <label>כל כמה זמן</label>
                    <input type="number" min="1" [(ngModel)]="form.recurrence_interval" name="recurrence_interval" />
                </div>
            </ng-container>
        </div>

        <div class="field full">
            <label>הערות</label>
            <textarea rows="4" [(ngModel)]="form.notes" name="notes" placeholder="הערות פנימיות לשירות..."></textarea>
        </div>

        <div class="actions">
            <button type="submit" [disabled]="saving">
                הוספת שירות
            </button>
        </div>
    </form>
</div>
